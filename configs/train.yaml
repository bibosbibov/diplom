# =============================================================================
# Гиперпараметры обучения — двухэтапная стратегия (CVSS v3.1 → CVSS v4.0).
# =============================================================================
# Файл загружается модулем src/training/.
# Глобальные пути и параметры данных см. в configs/config.yaml.
# =============================================================================

seed: 42

# -----------------------------------------------------------------------------
# DAPT — Domain-Adaptive Pretraining (опционально, перед этапом 1).
# Доучивает базовый mBERT на корпусе описаний уязвимостей (MLM,
# 15% маскирование). Результат сохраняется в output_dir и подаётся
# в stage 1 через `python -m src.training.train --stage 1
# --pretrained-name models/mbert_dapt`.
# -----------------------------------------------------------------------------
dapt:
  output_dir: "models/mbert_dapt"
  epochs: 2
  batch_size: 16            # на T4 без gradient_accumulation
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  mlm_probability: 0.15     # стандарт BERT/RoBERTa
  max_length: 512
  include_cwe_name: false   # cwe_name отдельным сигналом, чтобы не перекосить
  log_every_n_steps: 50
  save_total_limit: 1

# -----------------------------------------------------------------------------
# Этап 1 — предобучение на CVSS v3.1 (8 общих метрик).
# -----------------------------------------------------------------------------
stage1:
  learning_rate: 2.0e-5
  batch_size: 32
  epochs: 10
  warmup_ratio: 0.1
  metrics: ["AV", "AC", "PR", "UI", "VC", "VI", "VA", "E"]

  # Число классов на голову (CVSS v3.1).
  # E на этапе 1 — пятиклассовая голова (H/F/P/U/X), на этапе 2
  # переинициализируется в трёхклассовую (см. stage2.metric_classes.E).
  metric_classes:
    AV: 4   # N, A, L, P
    AC: 2   # L, H
    PR: 3   # N, L, H
    UI: 2   # N, R
    VC: 4   # H, L, N, X
    VI: 4   # H, L, N, X
    VA: 4   # H, L, N, X
    E:  5   # H, F, P, U, X

# -----------------------------------------------------------------------------
# Этап 2 — дообучение на CVSS v4.0 (все 12 метрик).
# -----------------------------------------------------------------------------
stage2:
  learning_rate: 1.0e-5
  batch_size: 16
  epochs: 20
  warmup_ratio: 0.1
  metrics: ["AV", "AC", "AT", "PR", "UI", "VC", "VI", "VA", "SC", "SI", "SA", "E"]

  # ВАЖНО: голова E переинициализируется наряду с AT/SC/SI/SA, потому что в
  # CVSS v4.0 у неё другое число классов (3 вместо 5 в v3.1) — старые веса
  # геометрически несовместимы.
  reinit_heads: ["AT", "SC", "SI", "SA", "E"]

  metric_classes:
    AV: 4   # N, A, L, P
    AC: 2   # L, H
    AT: 2   # N, P
    PR: 3   # N, L, H
    UI: 3   # N, P, A
    VC: 3   # H, L, N
    VI: 3   # H, L, N
    VA: 3   # H, L, N
    SC: 3   # H, L, N
    SI: 3   # H, L, N
    SA: 3   # H, L, N
    E:  3   # A, P, U

# -----------------------------------------------------------------------------
# Общие настройки (для обоих этапов).
# -----------------------------------------------------------------------------
common:
  weight_decay: 0.01
  dropout: 0.1
  gradient_clip: 1.0
  early_stopping_patience: 3
  mixed_precision: true        # автоматически отключается на CPU
  log_every_n_batches: 50
  checkpoint_every_epoch: true

paths:
  models_dir: "models/"
  checkpoints_dir: "models/checkpoints/"
  tensorboard_dir: "logs/tensorboard/"
  train_data: "data/processed/train.parquet"
  val_data: "data/processed/val.parquet"
  test_data: "data/processed/test.parquet"
